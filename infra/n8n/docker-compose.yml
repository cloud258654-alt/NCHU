name: bi-rmp-n8n

services:
  postgres:
    image: postgres:16-alpine
    container_name: bi-rmp-n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${N8N_DB_NAME:-n8n}
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:-change-this-local-password}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    networks:
      - bi-rmp-n8n

  n8n:
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n}
    container_name: bi-rmp-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${N8N_HOST_PORT:-5678}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:-change-this-local-password}
      DB_POSTGRESDB_SCHEMA: public
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS:-0}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      NODE_FUNCTION_ALLOW_BUILTIN: ${NODE_FUNCTION_ALLOW_BUILTIN:-crypto}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Taipei}
      TZ: ${TZ:-Asia/Taipei}
      BI_RMP_INTERNAL_API_KEY: ${BI_RMP_INTERNAL_API_KEY}
      BI_RMP_BACKEND_BASE_URL: ${BI_RMP_BACKEND_BASE_URL}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/opt/bi-rmp/n8n-workflows
    networks:
      - bi-rmp-n8n

volumes:
  n8n_data:
  n8n_postgres_data:

networks:
  bi-rmp-n8n:
    driver: bridge
