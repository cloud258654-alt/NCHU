name: BI-RMP CI

on:
  push:
  pull_request:

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install --quiet -r ../requirements.txt

      - name: Run backend tests
        id: backend_tests
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}/Backend
          DATABASE_URL: ""
        run: python -m pytest -q -x > pytest-output.txt 2>&1

      - name: Upload backend test output
        if: steps.backend_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-output
          path: Backend/pytest-output.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail when backend tests fail
        if: steps.backend_tests.outcome == 'failure'
        run: |
          cat pytest-output.txt
          exit 1

  n8n-compose-check:
    name: n8n Docker Compose config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate n8n Docker Compose configuration
        run: docker compose --env-file .env.example -f infra/n8n/docker-compose.yml config
